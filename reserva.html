<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservar vuelo - Vuelos Canarias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">✈ Vuelos Canarias</a>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-4">Formulario de reserva</h1>
    <a href="index.html" class="btn btn-secondary mb-4">← Volver al buscador</a>

    <form>

      <h4>Datos del vuelo</h4>

      <div class="mb-3">
        <label class="form-label">Origen</label>
        <select class="form-select" required>
          <option value="">Selecciona origen</option>
          <option>Gran Canaria (LPA)</option>
          <option>Tenerife Sur (TFS)</option>
          <option>Lanzarote (ACE)</option>
          <option>Fuerteventura (FUE)</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Destino</label>
        <select class="form-select" required>
          <option value="">Selecciona destino</option>
          <option>Tenerife Sur (TFS)</option>
          <option>Gran Canaria (LPA)</option>
          <option>La Palma (SPC)</option>
          <option>La Gomera (GMZ)</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Número de pasajeros</label>
        <input type="number" class="form-control" value="1" min="1" max="9">
      </div>

      <hr>
      <h4>Datos del pasajero</h4>

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" placeholder="Tu nombre" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Apellidos</label>
        <input type="text" class="form-control" placeholder="Tus apellidos" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" placeholder="tu@email.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label">DNI</label>
        <input type="text" class="form-control" placeholder="12345678X" required>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="residente">
        <label class="form-check-label" for="residente">Soy residente en Canarias (descuento 75%)</label>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="terminos" required>
        <label class="form-check-label" for="terminos">Acepto los términos y condiciones</label>
      </div>

      <button type="submit" class="btn btn-primary">Confirmar reserva</button>

    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
